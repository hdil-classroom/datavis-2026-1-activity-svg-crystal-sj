<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
		}

		#visualization-activity {
			width: 600px;
			height: 500px;
		}

		/* YOUR CSS CODE WILL GO HERE */
		.axis {
		stroke: black;
		stroke-width: 1;
		}

		.bar-line1 {
			fill: rgb(0, 62, 155); 
		}

		.bar-line2 {
			fill: rgb(23, 143, 2); 
		}

		.bar-line3 {
			fill: rgb(255, 145, 0);
		}

		.station {
			font-size: 10px;
			text-anchor: middle;
		}

		.value {
			font-size: 10px;
			text-anchor: middle;
		}


	</style>
</head>

<body>
	<h1 id="header-title">
		In-Class Activity by Sujeong Chang
	</h1>

	<svg id="visualization-activity">
		<!-- YOUR SVG CODE WILL GO HERE -->
		<!-- Axes -->
		<line class="axis" x1="75" y1="20" x2="75" y2="415"></line>
		<text x="280" y="460">Station Name</text>
		<line class="axis" x1="75" y1="415" x2="550" y2="415"></line>
		<text x="-200" y="15" transform="rotate(-90 25 25)">Entry Count</text>
		<text class="value" x="50" y="415">0</text> 
		<line class="axis" x1="70" y1="415" x2="75" y2="415"></line> 

		<text class="value" x="50" y="365">10,000</text>
		<line class="axis" x1="70" y1="365" x2="75" y2="365"></line>

		<text class="value" x="50" y="320">20,000</text>
		<line class="axis" x1="70" y1="320" x2="75" y2="320"></line>

		<text class="value" x="50" y="275">30,000</text>
		<line class="axis" x1="70" y1="275" x2="75" y2="275"></line>

		<text class="value" x="50" y="230">40,000</text>
		<line class="axis" x1="70" y1="230" x2="75" y2="230"></line> 

		<text class="value" x="50" y="185">50,000</text>
		<line class="axis" x1="70" y1="185" x2="75" y2="185"></line>

		<text class="value" x="50" y="140">60,000</text>
		<line class="axis" x1="70" y1="140" x2="75" y2="140"></line>

		<text class="value" x="50" y="95">70,000</text>
		<line class="axis" x1="70" y1="95"  x2="75" y2="95"></line>

		<text class="value" x="50" y="50">80,000</text>
		<line class="axis" x1="70" y1="50"  x2="75" y2="50"></line> 

		<!-- 홍대입구 -->
		<rect class="bar-line2" x="100" y="50" width="50" height="364.37"></rect>
		<text class="station" x="125" y="430">홍대입구</text>

		<!-- 잠실 -->
		<rect class="bar-line2" x="175" y="98.945" width="50" height="315.425"></rect>
		<text class="station" x="200" y="430">잠실(송파구청)</text>

		<!-- 고속터미널 -->
		<rect class="bar-line3" x="250" y="146.54" width="50" height="267.83"></rect>
		<text class="station" x="275" y="430">고속터미널</text>

		<!-- 서울역 -->
		<rect class="bar-line1" x="325" y="211.285" width="50" height="203.085"></rect>
		<text class="station" x="350" y="430">서울역</text>

		<!-- 신림 -->
		<rect class="bar-line2" x="400" y="223.015" width="50" height="191.355"></rect>
		<text class="station" x="425" y="430">신림</text>

		<!-- 신도림 -->
		<rect class="bar-line2" x="475" y="226.765" width="50" height="187.605"></rect>
		<text class="station" x="500" y="430">신도림</text>

	</svg>

</body>
</html>
